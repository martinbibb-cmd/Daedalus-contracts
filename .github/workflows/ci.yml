name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show tool versions
        run: |
          node --version
          npm --version
          npx tsc --version
          npx jest --version

      - name: Lint / typecheck
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run lint -- --pretty false

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build
        run: npm run build
